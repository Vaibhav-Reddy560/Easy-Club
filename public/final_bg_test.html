<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfected Premium Isometric Pattern</title>
    <style>
        :root {
            --sz: 60px; /* Base size */
            --bg: #050505;
            /* Face colors - very dark gold-tinted grey */
            --f1: #121212; /* Top face */
            --f2: #0a0a0a; /* Left face */
            --f3: #060606; /* Right face */
            /* Gold accent - reduced opacity for premium feel */
            --gold: rgba(255, 180, 5, 0.3);
            --gold-dim: rgba(255, 180, 5, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .premium-bg {
            position: absolute;
            inset: 0;
            background: 
                /* 4. Center Ambient Glow */
                radial-gradient(circle at 50% 50%, rgba(255, 180, 5, 0.05) 0%, transparent 70%),
                
                /* 3. Tapered "Y" Highlights (Star Junctions) */
                /* Using thin conic gradients to mimic the sharp lines in the reference */
                conic-gradient(from 120deg at 50% 25%, 
                    var(--gold) 0deg 0.5deg, transparent 0.5deg 119.5deg, 
                    var(--gold) 119.5deg 120.5deg, transparent 120.5deg 239.5deg, 
                    var(--gold) 239.5deg 240.5deg, transparent 240.5deg
                ) 0 0 / var(--sz) calc(var(--sz) * 1.732),
                
                /* 2. Secondary Highlights for Tapering Effect */
                radial-gradient(circle at 50% 25%, var(--gold-dim) 0%, transparent 20%) 0 0 / var(--sz) calc(var(--sz) * 1.732),
                
                /* 1. Main Isometric Faces */
                conic-gradient(from 120deg at 50% 25%, 
                    var(--f1) 0deg 120deg, 
                    var(--f2) 120deg 240deg, 
                    var(--f3) 240deg 360deg
                ) 0 0 / var(--sz) calc(var(--sz) * 1.732);
            
            /* Add contrast to make the edges pop slightly */
            filter: contrast(1.1);
        }

        .noise-overlay {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 1.5rem;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(180deg, #FFB405 0%, #AE7102 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        p {
            color: #888;
            letter-spacing: 0.5rem;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 1rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="premium-bg"></div>
    <div class="noise-overlay"></div>
    <div class="vignette"></div>
    
    <div class="content">
        <h1>EASY CLUB</h1>
        <p>Premium Isometric System</p>
    </div>
</body>
</html>
